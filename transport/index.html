<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{max-width:540px;margin:0 auto;min-height:100vh;background:#f5f5f3}
.pad{padding:1rem}
.lbl{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 6px}
.lbl.t0{margin-top:0}
.req{color:#A32D2D}
.card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem;margin-bottom:10px}
.field{margin-bottom:10px}.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:#888;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:15px;padding:9px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111}
.field textarea{min-height:60px;resize:vertical}
.field input.err{border-color:#A32D2D;background:#fff8f8}
.ferr{font-size:12px;color:#A32D2D;margin-top:3px}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;display:block;margin-top:6px}
.btn-p{background:#534AB7;color:#fff}.btn-d{background:#A32D2D;color:#fff}
.btn-o{background:#fff;color:#111;border:0.5px solid rgba(0,0,0,.2)}
.btn-g{background:#1D9E75;color:#fff}.btn-wa{background:#25D366;color:#fff}
.sel-btn{width:100%;padding:9px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left}
.sel-btn .ph{color:#888}
.dp{background:#fff;border:0.5px solid rgba(0,0,0,.2);border-radius:12px;margin-top:4px;overflow:hidden;display:none;position:relative;z-index:30}
.dp.open{display:block}
.dp input{width:100%;padding:9px 10px;border:none;border-bottom:0.5px solid rgba(0,0,0,.1);font-size:14px;background:#f5f5f3;color:#111}
.dp-list{max-height:170px;overflow-y:auto}
.dpi{padding:9px 12px;font-size:14px;cursor:pointer;color:#111;border-bottom:0.5px solid rgba(0,0,0,.07)}
.dpi:last-child{border-bottom:none}.dpi:hover{background:#f5f5f3}
.dpi .sub{font-size:11px;color:#888;margin-top:1px}
.dp-mt{padding:1rem;text-align:center;color:#888;font-size:13px}
.fuel-g{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.fb{padding:9px 4px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-size:12px;font-weight:500;color:#111}
.fb.sel{background:#EEEDFE;border-color:#534AB7;color:#3C3489}
.vsg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
.vsb{padding:13px 6px;border:0.5px solid rgba(0,0,0,.2);border-radius:10px;background:#fff;cursor:pointer;text-align:center}
.vsb.sel{border-color:#534AB7;background:#EEEDFE}.vsb.done{opacity:.4;pointer-events:none}
.vsb .vn{font-size:19px;font-weight:500}.vsb.sel .vn{color:#3C3489}
.vsb .vh{font-size:11px;color:#888;margin-top:2px}
.stags{display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin-bottom:8px}
.stag{padding:4px 9px;background:#EEEDFE;border-radius:20px;font-size:12px;color:#3C3489;display:inline-flex;align-items:center;gap:3px}
.stag button{background:none;border:none;color:#534AB7;font-size:14px;cursor:pointer;padding:0;line-height:1}
.rrow{display:flex;gap:8px;margin-top:4px}
.ropt{flex:1;padding:9px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;text-align:center;color:#888}
.ropt.yes{background:#EAF3DE;border-color:#3B6D11;color:#27500A}.ropt.no{background:#f5f5f3;color:#111}
.pzone{border:0.5px dashed rgba(0,0,0,.2);border-radius:8px;padding:11px;text-align:center;cursor:pointer;margin-top:8px;background:#f5f5f3}
.pzone p{font-size:13px;color:#888}
.pprev{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.pthumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:0.5px solid rgba(0,0,0,.1);cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bv1{background:#E1F5EE;color:#085041}.bv2{background:#E6F1FB;color:#0C447C}.bv3{background:#FAEEDA;color:#633806}
.bdmg{background:#FCEBEB;color:#791F1F}.bok{background:#EAF3DE;color:#27500A}.bact{background:#EEEDFE;color:#3C3489}.bwrn{background:#FAEEDA;color:#633806}
.fase-pip{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;background:#f0f0ee;color:#aaa;margin-right:3px;border:0.5px solid #ddd}
.fase-pip.done{background:#EEEDFE;color:#534AB7;border-color:#AFA9EC}
.phase-hdr{background:linear-gradient(135deg,#f0efff,#eaf0ff);border-radius:12px;padding:12px 14px;margin-bottom:14px;border:0.5px solid #AFA9EC}
.phase-num{font-size:10px;font-weight:600;color:#534AB7;text-transform:uppercase;letter-spacing:.08em}
.phase-title{font-size:17px;font-weight:600;color:#3C3489;margin-top:3px}
.sbar{display:flex;gap:6px;margin-bottom:1rem}
.step{flex:1;height:3px;border-radius:2px;background:rgba(0,0,0,.1)}.step.d{background:#534AB7}.step.c{background:#AFA9EC}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 1rem;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1);position:sticky;top:0;z-index:20}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-logo{width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0}
.hdr-n{font-size:13px;font-weight:500}.hdr-r{font-size:11px;color:#888}
.log-btn{font-size:12px;padding:5px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;background:none;cursor:pointer;color:#888}
.tab-bar{display:flex;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1)}
.tb{flex:1;padding:10px 4px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap}
.tb.active{color:#534AB7;border-bottom:2px solid #534AB7}
.view{display:none}.view.active{display:block}
.pin-dots{display:flex;justify-content:center;gap:10px;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #534AB7;background:transparent}
.pin-dot.f{background:#534AB7}

/* Image utils */
function compressImage(file,maxW,quality){
  return new Promise(function(resolve){
    var canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),img=new Image();
    var objUrl=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(objUrl);
      var w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      canvas.width=w;canvas.height=h;
      if(ctx)ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(function(blob){resolve(blob||null);},'image/jpeg',quality||0.72);
    };
    img.onerror=function(){URL.revokeObjectURL(objUrl);resolve(null);};
    img.src=objUrl;
  });
}
async function uploadImages(files,jornadaId,tag){
  var ts=Date.now();
  var results=await Promise.all(Array.from(files).map(async function(file,i){
    try{
      var c=await compressImage(file,1024,0.72);
      if(!c)return null;
      var ref=fbst.ref('jornadas/'+jornadaId+'/'+tag+'_'+ts+'_'+i+'.jpg');
      await ref.put(c,{contentType:'image/jpeg'});
      return await ref.getDownloadURL();
    }catch(e){console.error('Upload error:',e);return null;}
  }));
  return results.filter(Boolean);
}

/* Share */
function compartirCard(cardId,filename,title){
  var el=document.getElementById(cardId);
  if(!el){alert('No se encontr\u00f3 el contenido a compartir.');return;}
  if(typeof html2canvas==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=function(){compartirCard(cardId,filename,title);};
    s.onerror=function(){alert('Error al cargar la librer\u00eda. Verifica tu conexi\u00f3n.');};
    document.head.appendChild(s);return;
  }
  var ov=document.createElement('div');
  ov.className='loading-overlay';
  ov.innerHTML='<div class="spin"></div><p>Generando imagen...</p>';
  document.body.appendChild(ov);
  html2canvas(el,{backgroundColor:'#ffffff',scale:2,useCORS:true,allowTaint:true,logging:false}).then(function(canvas){
    document.body.removeChild(ov);
    canvas.toBlob(function(blob){
      if(!blob){alert('No se pudo generar la imagen.');return;}
      var file=new File([blob],filename,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:title}).catch(function(err){
          if(err.name!=='AbortError'){
            var url=URL.createObjectURL(blob);
            var a=document.createElement('a');a.href=url;a.download=filename;
            document.body.appendChild(a);a.click();document.body.removeChild(a);
            setTimeout(function(){URL.revokeObjectURL(url);},200);
          }
        });
      }else{
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');a.href=url;a.download=filename;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(url);},200);
        setTimeout(function(){
          if(confirm('Imagen descargada. \u00bfAbrir WhatsApp para compartirla?')){
            window.open('https://wa.me/','_blank');
          }
        },600);
      }
    },'image/png',0.92);
  }).catch(function(err){
    document.body.removeChild(ov);
    console.error('html2canvas error:',err);
    alert('No se pudo capturar la imagen. Toma una captura de pantalla manual.');
  });
}

function updKmDelta(){
  var el=document.getElementById('km-delta');if(!el)return;
  var km=parseInt((document.getElementById('i-km')||{}).value)||0;
  if(!km||!iniSt.pat){el.innerHTML='';return;}
  var prevJ=DB.jornadas.filter(function(x){return x.pat===iniSt.pat&&x.estado==='cerrado'&&x.kmFin>0;})
    .sort(function(a,b){return (b.id||0)-(a.id||0);})[0];
  if(!prevJ){el.innerHTML='<div style="font-size:11px;color:#888;margin-top:3px">Sin jornadas previas para esta patente.</div>';return;}
  var delta=km-prevJ.kmFin;
  el.innerHTML=delta>=0?
    '<div style="font-size:11px;color:#1D9E75;margin-top:3px">+'+delta.toLocaleString('es-CL')+' km desde la \u00faltima jornada ('+prevJ.fecha+' \u00b7 od\u00f3metro cierre: '+prevJ.kmFin.toLocaleString('es-CL')+' km)</div>':
    '<div style="font-size:11px;color:#A32D2D;margin-top:3px">\u26a0 Km menor al od\u00f3metro de la \u00faltima jornada ('+prevJ.kmFin.toLocaleString('es-CL')+' km \u00b7 '+prevJ.fecha+')</div>';
}
function iniciarJ(){
  var hr=document.getElementById('i-hr').value.trim();
  var hre=document.getElementById('err-hr');
  if(hre)hre.textContent='';
  if(!hr){if(hre)hre.textContent='Ingresa el N\u00ba de Hoja de Ruta.';return;}
  if(!iniSt.pat){alert('Selecciona una patente.');return;}
  if(iniSt.fuelIdx<0){alert('Indica el combustible inicial.');return;}
  var km=parseInt(document.getElementById('i-km').value)||0;
  if(!km){alert('Ingresa el km inicial.');return;}
  var fi=document.getElementById('i-fecha').value;
  if(!fi){alert('Indica la fecha.');return;}
  var u=SES.u;
  var cL=document.getElementById('lbl-cond'),aL=document.getElementById('lbl-ayu');
  var cond=u.rol==='conductor'?u.nombre:((cL&&!cL.classList.contains('ph'))?cL.textContent:'');
  var ayu=u.rol==='ayudante'?u.nombre:((aL&&!aL.classList.contains('ph'))?aL.textContent:'');
  if(!cond){alert('Selecciona el conductor.');return;}
  if(!ayu){alert('Selecciona el ayudante.');return;}
  var prevJ=DB.jornadas.filter(function(x){return x.pat===iniSt.pat&&x.estado==='cerrado'&&x.kmFin>0;})
    .sort(function(a,b){return (b.id||0)-(a.id||0);})[0];
  var kmDelta=prevJ?km-prevJ.kmFin:null;
  var btn=document.getElementById('btn-ini');if(btn){btn.textContent='Obteniendo GPS...';btn.disabled=true;}
  var done=false;
  function crearJ(lat,lng){
    if(done)return;done=true;
    var j={
      id:Date.now(),fecha:fmt(fi),fechaISO:fi,horaIni:nowT(),
      pat:iniSt.pat,hojaRuta:hr,cond:cond,ayu:ayu,
      kmIni:km,fuelIni:FUELS[iniSt.fuelIdx],
      vueltas:[],estado:'activo',
      kmFin:0,fuelFin:'',horaFin:'',kmTotal:0,
      creadoPor:SES.u?SES.u.id:'',
      gpsIni:{lat:lat,lng:lng},
      kmDeltaUltima:kmDelta
    };
    DB.jornadas.unshift(j);saveJornada(j);renderActivo(j);
  }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(p){crearJ(p.coords.latitude.toFixed(6),p.coords.longitude.toFixed(6));},
      function(){crearJ('','');},
      {timeout:5000,maximumAge:30000}
    );
  }else{crearJ('','');}
}

async function guardarFase1(){
  var j=actJ();var num=vSt.num;
  if(!vSt.sucs.length){alert('Selecciona al menos una sucursal.');return;}
  clrErr(['err-ks','err-hs']);
  var ks=parseInt(document.getElementById('v-ks').value)||0;
  var hs=document.getElementById('v-hs').value;
  if(!hs){setErr('err-hs','Indica la hora de salida.');return;}
  var pv=prevVuelta(j,num);
  if(pv&&pv.kmllg&&ks&&ks<pv.kmllg){setErr('err-ks','Km salida debe ser \u2265 km llegada de la '+pv.num+'\u00aa vuelta ('+pv.kmllg+').');return;}
  var btn=document.getElementById('btn-f1');if(btn){btn.textContent='Guardando...';btn.disabled=true;}
  setSyncStatus(false,'Subiendo...');
  var a2El=document.getElementById('lbl-ayu2');
  var a2N=(a2El&&!a2El.classList.contains('ph'))?a2El.textContent:(vSt.ayu2||'');
  var ev=actVuelta(j,num);
  var prevImgs1=(ev&&ev.imgs1)||[];
  var newImgs1=vSt.imgs1&&vSt.imgs1.length?await uploadImages(vSt.imgs1.slice(0,Math.max(0,5-prevImgs1.length)),j.id,'v'+num+'_f1_ds'):[];
  var hrVuelta=((document.getElementById('v-hr')||{}).value||'').trim();
  var vuelta={
    num:num,sucs:vSt.sucs.map(function(s){return 'Suc.'+s.n;}).join(', '),ayu2:a2N,
    hojaRuta:hrVuelta||'',
    hsal:hs,kmsal:ks,
    ds:vSt.ds,dscmt:document.getElementById('v-dc')?document.getElementById('v-dc').value:'',
    imgs1:prevImgs1.concat(newImgs1),fase1Done:true,
    de:ev?(ev.de||''):'',decmt:ev?(ev.decmt||''):'',imgs2:ev?(ev.imgs2||[]):[],
    rc:ev?(ev.rc||''):'',rccmt:ev?(ev.rccmt||''):'',fase2Done:ev?(ev.fase2Done||false):false,
    hllg:ev?(ev.hllg||''):'',kmllg:ev?(ev.kmllg||0):0,kmrec:ev?(ev.kmrec||0):0,
    obs:ev?(ev.obs||''):'',fase3Done:ev?(ev.fase3Done||false):false,
    updatedAt:nowF()
  };
  if(ev){var idx=j.vueltas.indexOf(ev);if(idx>=0)j.vueltas[idx]=vuelta;}else{j.vueltas.push(vuelta);}
  saveJornada(j);
  if(vuelta.ds==='si')enviarCorreoIncidencia('ds',j,vuelta,vuelta.dscmt,vuelta.imgs1);
  renderResumenFase1(j,vuelta);
}

function guardarFase3(num){
  var j=actJ();var v=actVuelta(j,num);if(!v)return;
  clrErr(['err-hl','err-kl']);
  var hl=document.getElementById('v-hl').value;
  var kl=parseInt(document.getElementById('v-kl').value)||0;
  var ok=true;
  if(!hl){setErr('err-hl','Ingresa la hora de llegada.');ok=false;}
  if(!kl){setErr('err-kl','Ingresa el km de llegada.');ok=false;}
  if(v.kmsal&&kl&&kl<=v.kmsal){setErr('err-kl','Km llegada debe ser mayor al Km de salida ('+v.kmsal+').');ok=false;}
  if(v.hsal&&hl&&toMins(hl)<toMins(v.hsal)){setErr('err-hl','Hora llegada debe ser \u2265 hora de salida ('+v.hsal+').');ok=false;}
  if(!ok)return;
  v.hllg=hl;v.kmllg=kl;v.kmrec=kl>v.kmsal?kl-v.kmsal:0;
  v.obs=document.getElementById('v-ob')?document.getElementById('v-ob').value:'';
  v.fase3Done=true;v.updatedAt=nowF();
  saveJornada(j);
  if(v.obs)enviarCorreoIncidencia('obs',j,v,v.obs,[]);
  renderResumenVuelta(j,v);
}

function prevHr(inp){
  var MAX=5;
  var files=Array.from(inp.files).slice(0,MAX);
  if(inp.files.length>MAX)alert('Máximo '+MAX+' fotos de hoja de ruta.');
  fotoHrFiles=files;
  var el=document.getElementById('hr-prev');if(!el)return;
  var pz=document.getElementById('hr-pzone');if(pz)pz.style.display=files.length?'none':'';
  var err=document.getElementById('err-hr-photo');if(err)err.textContent='';
  el.innerHTML='';
  files.forEach(function(f){
    var img=document.createElement('img');
    var url=URL.createObjectURL(f);
    img.onload=function(){URL.revokeObjectURL(url);};
    img.src=url;img.className='pthumb';
    img.style.cssText='width:80px;height:80px';el.appendChild(img);
  });
  var cnt=document.getElementById('hr-cnt');
  if(cnt)cnt.textContent=files.length?files.length+' foto'+(files.length>1?'s':'')+' seleccionada'+(files.length>1?'s':''):'';
}
function previewCierre(){

  var j=actJ(),lv=lastVuelta(j);
  if(lv&&lv.kmllg&&kmf<lv.kmllg){
    var e=document.getElementById('err-fkm');
    if(e)e.textContent='El Km final debe ser \u2265 al Km de llegada de la \u00faltima vuelta ('+lv.kmllg.toLocaleString('es-CL')+').';

  var btnCarga='<br><button onclick="irACargarCombustible()" style="'+btnStyle+'">&#9981; Registrar carga de combustible</button>';

async function confirmarGuardar(){
  var j=actJ();if(!j)return;
  var btn=document.querySelector('.btn-g');if(btn){btn.textContent='Obteniendo GPS...';btn.disabled=true;}
  var gps=await new Promise(function(resolve){
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        function(p){resolve({lat:p.coords.latitude.toFixed(6),lng:p.coords.longitude.toFixed(6)});},
        function(){resolve({lat:'',lng:''});},
        {timeout:5000,maximumAge:30000}
      );
    }else{resolve({lat:'',lng:''});}
  });
  if(btn)btn.textContent='Guardando...';
  setSyncStatus(false,'Guardando...');
  if(fotoHrFiles.length){
    try{
      var hrUrls=await uploadImages(fotoHrFiles,j.id,'hr_'+j.hojaRuta);
      j.fotosHojaRuta=hrUrls;
      j.fotoHojaRuta=hrUrls[0]||'';
    }catch(e){j.fotosHojaRuta=[];j.fotoHojaRuta='';}
  }
  j.kmFin=tempCierre.kmFin;j.fuelFin=FUELS[tempCierre.fuelIdx];j.horaFin=nowT();
  j.kmTotal=tempCierre.kmFin>j.kmIni?tempCierre.kmFin-j.kmIni:0;
  j.obsCierre=tempCierre.obs;j.estado='cerrado';j.closedAt=nowF();
  j.gpsFin={lat:gps.lat,lng:gps.lng};
  tempCierre={kmFin:0,fuelIdx:-1,obs:''};fotoHrFiles=[];
  saveJornada(j);
  renderJornadaGuardada(j);
}

function switchPTab(tab){
  var divs={v:'pp-v',c:'pp-c',e:'pp-e'};
  var btns={v:'ptab-v',c:'ptab-c',e:'ptab-e'};
  Object.keys(divs).forEach(function(k){
    var d=document.getElementById(divs[k]);if(d)d.style.display=(k===tab)?'':'none';
    var b=document.getElementById(btns[k]);
    if(b){b.style.background=k===tab?'#EEEDFE':'none';b.style.color=k===tab?'#534AB7':'#888';}
  });
  if(tab==='v')renderTbl();
  else if(tab==='c')renderTblComb();
  else if(tab==='e')renderTblCorreos();
}
async function recargarDatos(){setSyncStatus(false,'Actualizando...');await loadFromFirestore();renderPanel();}
function getJornadaISO(j){
  if(j.fechaISO)return j.fechaISO;
  if(j.fecha){var p=j.fecha.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:'';}
  return '';
}
function getHRFotos(j){
  if(j.fotosHojaRuta&&j.fotosHojaRuta.length)return j.fotosHojaRuta;
  if(j.fotoHojaRuta)return [j.fotoHojaRuta];
  return [];
}
function esPropia(j){
  var u=SES.u;if(!u)return false;
  if(u.rol==='admin')return true;
  if(j.creadoPor)return j.creadoPor===u.id;
  return j.cond===u.nombre||j.ayu===u.nombre;
}
function updStats(){
  var hoy=fmt(toISO()),hv=[];
  DB.jornadas.forEach(function(j){if(esPropia(j)&&j.fecha===hoy)j.vueltas.forEach(function(v){if(v.fase3Done)hv.push(v);});});
  var sh=document.getElementById('st-h'),si=document.getElementById('st-i');
  if(sh)sh.textContent=hv.length;
  if(si)si.textContent=hv.filter(function(v){return v.ds==='si'||v.de==='si'||v.rc==='si';}).length;
  var pats=[];DB.jornadas.forEach(function(j){if(esPropia(j)&&pats.indexOf(j.pat)<0)pats.push(j.pat);});
  var fp=document.getElementById('fp-p');if(!fp)return;var cv=fp.value;
  fp.innerHTML='<option value="">Todas las patentes</option>'+pats.map(function(p){return '<option'+(p===cv?' selected':'')+'>'+p+'</option>';}).join('');
}
function renderTbl(){
  var isAdm=SES.u&&SES.u.rol==='admin';
  var fpv=(document.getElementById('fp-p')||{}).value||'';
  var fvv=(document.getElementById('fp-v')||{}).value||'';
  var rows=[];
  var ffD=(document.getElementById('ff-desde')||{}).value||'';
  var ffH=(document.getElementById('ff-hasta')||{}).value||'';
  DB.jornadas.forEach(function(j){
    if(!esPropia(j))return;
    var iso=getJornadaISO(j);
    if(ffD&&iso&&iso<ffD)return;
    if(ffH&&iso&&iso>ffH)return;
    if(fpv&&j.pat!==fpv)return;
    j.vueltas.forEach(function(v){if(!fvv||String(v.num)===fvv)rows.push({j:j,v:v});});
  });
  rows.sort(function(a,b){return (b.j.id||0)-(a.j.id||0);});
  var tb=document.getElementById('tbl-body'),em=document.getElementById('tbl-empty');
  if(!rows.length){if(tb)tb.innerHTML='';if(em)em.style.display='block';return;}
  if(em)em.style.display='none';
  var bc=['','bv1','bv2','bv3'];
  var colspan=isAdm?'14':'13';
  tb.innerHTML=rows.map(function(r,ri){
    var j=r.j,v=r.v;
    var inc=v.ds==='si'||v.de==='si'||v.rc==='si';
    var hasImgs=(v.imgs1&&v.imgs1.length)||(v.imgs2&&v.imgs2.length);
    var hasHR=getHRFotos(j).length>0;
    var hasDetail=inc||hasImgs||hasHR;
    var statusBadge=v.fase3Done?'':'<span class="badge bwrn" style="font-size:10px">Inc.</span>';
    var hrBadge=hasHR?'<span class="badge bok" style="font-size:10px">\ud83d\udcf7 HR</span>':'';
    return '<tr>'+
      '<td>'+j.fecha+'</td>'+
      '<td style="font-weight:500">'+j.hojaRuta+' '+hrBadge+'</td>'+
      '<td>'+j.pat+'</td><td>'+j.cond+'</td>'+
      '<td><span class="badge '+(bc[v.num]||'bv1')+'">'+v.num+'\u00aa</span> '+statusBadge+'</td>'+
      '<td style="max-width:100px;overflow:hidden;text-overflow:ellipsis" title="'+v.sucs+'">'+v.sucs+'</td>'+
      '<td>'+(v.hsal||'\u2014')+'</td><td>'+(v.hllg||'\u2014')+'</td>'+
      '<td>'+(v.kmrec?v.kmrec.toLocaleString('es-CL')+' km':'\u2014')+'</td>'+
      '<td>'+(v.ds==='si'?'<span class="badge bdmg">S\u00ed</span>':'<span style="color:#888">No</span>')+'</td>'+
      '<td>'+(v.de==='si'?'<span class="badge bdmg">S\u00ed</span>':'<span style="color:#888">No</span>')+'</td>'+
      '<td>'+(v.rc==='si'?'<span class="badge bdmg">S\u00ed</span>':'<span style="color:#888">No</span>')+'</td>'+
      '<td>'+(hasDetail?'<button class="exp-btn" style="padding:3px 8px;font-size:11px" onclick="togInc(this,'+ri+')">Ver</button>':'')+'</td>'+
      (isAdm?'<td style="white-space:normal"><div style="display:flex;flex-direction:column;gap:4px">'+
        '<button class="exp-btn" style="padding:3px 8px;font-size:11px;border-color:#534AB7;color:#534AB7" onclick="renderEditVueltaAdm('+j.id+','+v.num+')">Vuelta</button>'+
        '<button class="exp-btn" style="padding:3px 8px;font-size:11px;border-color:#1D9E75;color:#1D9E75" onclick="renderEditJornadaAdm('+j.id+')">Jornada</button>'+
      '</div></td>':'')+
    '</tr>'+
    (hasDetail?'<tr id="inc-'+ri+'" style="display:none"><td colspan="'+colspan+'" style="padding:6px 10px;background:#FFFBF5">'+buildInc(v,j)+'</td></tr>':'');
  }).join('');
}
function buildInc(v,j){
  var h='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:4px 0">';
  if(v.ds==='si'){
    h+='<div class="inc-detail"><span class="il">Da\u00f1o al recibir</span>'+v.dscmt;
    if(v.imgs1&&v.imgs1.length)h+='<div class="res-imgs" style="margin-top:6px">'+v.imgs1.map(function(u){return '<img class="res-img" src="'+u+'" onclick="openImgViewer(\''+u+'\')">';}).join('')+'</div>';
    h+='</div>';
  }
  if(v.de==='si'){
    h+='<div class="inc-detail"><span class="il">Da\u00f1o en entrega</span>'+v.decmt;
    if(v.imgs2&&v.imgs2.length)h+='<div class="res-imgs" style="margin-top:6px">'+v.imgs2.map(function(u){return '<img class="res-img" src="'+u+'" onclick="openImgViewer(\''+u+'\')">';}).join('')+'</div>';
    h+='</div>';
  }
  if(v.rc==='si')h+='<div class="inc-detail"><span class="il">Reclamo</span>'+v.rccmt+'</div>';
  var hrFotos=getHRFotos(j);
  if(hrFotos.length){
    h+='<div class="inc-detail" style="width:100%;background:#EAF3DE">'+
      '<span class="il" style="color:#27500A">\ud83d\udcf7 Foto(s) Hoja de Ruta \u00b7 '+j.hojaRuta+'</span>'+
      '<div class="res-imgs" style="margin-top:6px">'+
        hrFotos.map(function(u){return '<img class="res-img" style="width:90px;height:70px" src="'+u+'" onclick="openImgViewer(\''+u+'\')">';}).join('')+
      '</div></div>';
  }
  if(v.hojaRuta&&v.hojaRuta!==j.hojaRuta){
    h+='<div class="inc-detail" style="width:100%;background:#EEEDFE"><span class="il" style="color:#534AB7">Hoja de Ruta de esta vuelta</span>'+v.hojaRuta+'</div>';
  }
  h+='<div style="font-size:11px;color:#888;width:100%;margin-top:2px">Actualizado: '+(v.updatedAt||'\u2014')+'</div>';
  return h+'</div>';
}

function prevPAdm(inp,pid,key,prevCount){
  var el=document.getElementById(pid);if(!el)return;

function deleteVueltaAdm(jId,vNum){

  if(btn.dataset.step==='confirm'){
    var j=DB.jornadas.find(function(x){return x.id===jId;});if(!j)return;
    j.vueltas=j.vueltas.filter(function(v){return v.num!==vNum;});
    saveJornada(j);

    renderTbl();
  }else{
    btn.dataset.step='confirm';
    btn.textContent='¿Confirmar? Toca de nuevo para eliminar';
    setTimeout(function(){
      if(btn&&btn.dataset.step==='confirm'){delete btn.dataset.step;btn.textContent='Eliminar esta vuelta';}
    },4000);
  }
}

function loadX(cb){if(typeof XLSX!=='undefined'){cb();return;}var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=cb;document.head.appendChild(s);}
function dlT(id){
  if(typeof XLSX==='undefined'){alert('Cargando...');return;}
  var ws,wb=XLSX.utils.book_new();
  if(id==='usr-xls')ws=XLSX.utils.aoa_to_sheet([['Nombre','Rol','PIN','Permisos'],['Juan','conductor','1234','jornada']]);
  else if(id==='pat-xls')ws=XLSX.utils.aoa_to_sheet([['Patente'],['ABCD12']]);
  else ws=XLSX.utils.aoa_to_sheet([['Numero','Direccion'],['10F','Av. Ejemplo 123'],['12','Calle Muestra 456']]);
  XLSX.utils.book_append_sheet(wb,ws,'Datos');
  XLSX.writeFile(wb,id.replace('-xls','')+'.xlsx');
}
function hXLS(id,inp){

  loadX(function(){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        var count=0;
        if(id==='usr-xls'){
          rows.forEach(function(r){
            var n=String(r['Nombre']||'').trim(),rol=String(r['Rol']||'conductor').trim();
            var p=String(r['PIN']||'').trim();
            var pm=String(r['Permisos']||'jornada').split(',').map(function(x){return x.trim();});
            if(n&&p&&!DB.usuarios.find(function(x){return x.nombre===n;})){
              DB.usuarios.push({id:'u'+Date.now()+'x'+count,nombre:n,rol:rol,pin:p,mustChangePIN:true,permisos:pm});count++;
            }
          });
        }else if(id==='pat-xls'){
          rows.forEach(function(r){
            var v=String(r['Patente']||'').trim().toUpperCase();
            if(v&&DB.patentes.indexOf(v)<0){DB.patentes.push(v);count++;}
          });
        }else{
          rows.forEach(function(r){
            var n=String(r['Numero']||'').trim().toUpperCase(),a=String(r['Direccion']||'').trim();
            if(n&&a&&!DB.sucursales.find(function(s){return String(s.n).toUpperCase()===n;})){DB.sucursales.push({n:n,addr:a});count++;}
          });
          DB.sucursales.sort(function(a,b){return String(a.n).localeCompare(String(b.n),undefined,{numeric:true,sensitivity:'base'});});
        }
        saveConfig();
        res.className='ur ok';res.textContent=count+' registros importados.';
        inp.value='';setTimeout(renderAdmin,300);
      }catch(err){res.className='ur err';res.textContent='Error al leer el archivo.';}
    };
    reader.readAsArrayBuffer(file);
  });
}

function guardarEditU(i){
  var u=DB.usuarios[i];if(!u)return;
  var nombre=(document.getElementById('eu-n').value||'').trim();
  var rol=document.getElementById('eu-r').value;
  var pin=(document.getElementById('eu-p').value||'').trim();
  if(!nombre){alert('Ingresa el nombre del usuario.');return;}
  if(allU().find(function(x){return x.nombre===nombre&&x.id!==u.id;})){alert('Ya existe otro usuario con ese nombre.');return;}
  if(pin&&!/^\d{4}$/.test(pin)){alert('El PIN debe ser exactamente 4 dígitos.');return;}
  var perms=[];
  if(document.getElementById('eu-pj').checked)perms.push('jornada');
  if(document.getElementById('eu-pr').checked)perms.push('registros');
  if(document.getElementById('eu-pa').checked)perms.push('admin');
  if(document.getElementById('eu-pc').checked)perms.push('comunicaciones');
  if(!perms.length){alert('Selecciona al menos un módulo.');return;}
  u.nombre=nombre;u.rol=rol;u.permisos=perms;
  u.mustChangePIN=document.getElementById('eu-mcp').checked;
  if(pin)u.pin=pin;
  if(SES.u&&SES.u.id===u.id){
    SES.u.nombre=nombre;SES.u.rol=rol;SES.u.permisos=perms;if(pin)SES.u.pin=pin;
    var hn=document.getElementById('hdr-n');if(hn)hn.textContent=nombre;
    var hr=document.getElementById('hdr-r');if(hr)hr.textContent=rol;
  }
  saveConfig();
  document.getElementById('edit-u-overlay').remove();
  renderAdmin();
}

function resolverVariables(tmpl,j,v,detalle,imgs,linkFoto){
  var r=String(tmpl||'')
    .replace(/\{\{fecha\}\}/g,j.fecha||'')
    .replace(/\{\{hojaRuta\}\}/g,j.hojaRuta||'')
    .replace(/\{\{patente\}\}/g,j.pat||'')
    .replace(/\{\{conductor\}\}/g,j.cond||'')
    .replace(/\{\{ayudante\}\}/g,j.ayu||'')
    .replace(/\{\{ayudante2\}\}/g,v.ayu2||'')
    .replace(/\{\{vuelta\}\}/g,String(v.num||''))
    .replace(/\{\{sucursales\}\}/g,v.sucs||'')
    .replace(/\{\{horaSalida\}\}/g,v.hsal||'--')
    .replace(/\{\{horaLlegada\}\}/g,v.hllg||'--')
    .replace(/\{\{kmSalida\}\}/g,String(v.kmsal||'--'))
    .replace(/\{\{kmLlegada\}\}/g,String(v.kmllg||'--'))
    .replace(/\{\{kmRecorridos\}\}/g,String(v.kmrec||'--'))
    .replace(/\{\{detalle\}\}/g,detalle||'');
  var fotoUrl=imgs&&imgs.length?imgs[0]:'';
  var fl='';
  if(linkFoto&&fotoUrl)fl=linkFoto+': '+fotoUrl;
  return r.replace(/\{\{foto\}\}/g,fl);
}
function resolverVariablesHtml(tmpl,j,v,detalle,imgs,linkFoto){
  var r=String(tmpl||'')
    .replace(/\{\{fecha\}\}/g,j.fecha||'')
    .replace(/\{\{hojaRuta\}\}/g,j.hojaRuta||'')
    .replace(/\{\{patente\}\}/g,j.pat||'')
    .replace(/\{\{conductor\}\}/g,j.cond||'')
    .replace(/\{\{ayudante\}\}/g,j.ayu||'')
    .replace(/\{\{ayudante2\}\}/g,v.ayu2||'')
    .replace(/\{\{vuelta\}\}/g,String(v.num||''))
    .replace(/\{\{sucursales\}\}/g,v.sucs||'')
    .replace(/\{\{horaSalida\}\}/g,v.hsal||'--')
    .replace(/\{\{horaLlegada\}\}/g,v.hllg||'--')
    .replace(/\{\{kmSalida\}\}/g,String(v.kmsal||'--'))
    .replace(/\{\{kmLlegada\}\}/g,String(v.kmllg||'--'))
    .replace(/\{\{kmRecorridos\}\}/g,String(v.kmrec||'--'))
    .replace(/\{\{detalle\}\}/g,detalle||'');
  var fotoUrl=imgs&&imgs.length?imgs[0]:'';
  var fotoTag=linkFoto&&fotoUrl?('<a href="'+fotoUrl+'" style="color:#534AB7">'+linkFoto+'</a>'):'';
  return r.replace(/\{\{foto\}\}/g,fotoTag).replace(/\n/g,'<br>');
}
function enviarCorreoIncidencia(tipo,j,v,detalle,imgs){
  var comms=getComms();
  var r=comms.reglas&&comms.reglas[tipo];
  if(!r||!r.activo||!r.dest||!r.dest.length||!comms.gasUrl)return;
  var asunto=resolverVariables(r.asunto,j,v,detalle,imgs,r.linkFoto);
  var cuerpo=resolverVariables(r.cuerpo,j,v,detalle,imgs,r.linkFoto);
  var cuerpoHtml=resolverVariablesHtml(r.cuerpo,j,v,detalle,imgs,r.linkFoto);
  var to=r.dest.join(', '),cc=(r.cc||[]).join(', ');
  var logRef=fbdb.collection('emails_log').doc('el_'+Date.now()+'_'+tipo);
  logRef.set({
    tipo:tipo,tipoNombre:COMMS_TIPOS[tipo].nombre,
    fechaEnvio:nowF(),to:to,cc:cc,asunto:asunto,
    hojaRuta:j.hojaRuta,patente:j.pat,vuelta:v.num,conductor:j.cond,
    estado:'enviando'
  }).catch(function(){});
  fetch(comms.gasUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({to:to,cc:cc,subject:asunto,body:cuerpo,htmlBody:cuerpoHtml})
  })
  .then(function(){logRef.update({estado:'enviado'}).catch(function(){});})
  .catch(function(e){logRef.update({estado:'error',error:e.message||'Error de conexión'}).catch(function(){});});
}

function prevFotoGen(inp,prevId,zoneId,errId){
  var el=document.getElementById(prevId),pz=document.getElementById(zoneId);

  if(!el||!inp.files||!inp.files[0])return;

  var img=document.createElement('img');

function calcPxL(adm){
  var p=adm?'adm-':'';
  var l=parseFloat((document.getElementById(p+'c-litros')||{}).value)||0;

  var row=document.getElementById(adm?'adm-pxl-row':'c-pxl-row');

async function guardarCarga(jornadaId){
  var j=DB.jornadas.find(function(x){return String(x.id)===String(jornadaId);});
  if(!j){alert('Jornada no encontrada.');return;}
  var km=parseInt((document.getElementById('c-km')||{}).value)||0;
  var litros=parseFloat((document.getElementById('c-litros')||{}).value)||0;
  var valor=parseFloat((document.getElementById('c-valor')||{}).value)||0;
  var fotoInp=document.getElementById('c-foto');
  var ok=true;
  if(!km||km<=0){setErr('err-c-km','Ingresa el km del odómetro.');ok=false;}
  if(!litros||litros<=0){setErr('err-c-litros','Ingresa los litros cargados.');ok=false;}
  if(!valor||valor<=0){setErr('err-c-valor','Ingresa el valor total de la compra.');ok=false;}
  if(!fotoInp||!fotoInp.files||!fotoInp.files[0]){setErr('err-c-foto','Debes fotografiar el comprobante.');ok=false;}
  if(!ok)return;
  var btn=document.getElementById('btn-c');if(btn){btn.textContent='Subiendo foto...';btn.disabled=true;}
  setSyncStatus(false,'Subiendo...');
  var fechaEl=document.getElementById('c-fecha'),horaEl=document.getElementById('c-hora');
  var latEl=document.getElementById('c-lat'),lngEl=document.getElementById('c-lng');
  var lat=latEl?latEl.value:'',lng=lngEl?lngEl.value:'';
  var fotoUrl='';
  try{var urls=await uploadImages(Array.from(fotoInp.files),jornadaId,'carga_v');fotoUrl=urls[0]||'';}
  catch(e){console.error('Upload voucher:',e);}
  var carga={
    id:Date.now(),
    fecha:fechaEl?fmt(fechaEl.value):fmt(toISO()),fechaISO:fechaEl?fechaEl.value:toISO(),
    hora:horaEl?horaEl.value:nowT(),
    lat:lat,lng:lng,
    kmOdo:km,
    litros:litros,valorTotal:valor,
    valorLitro:Math.round(valor/litros),
    fotoVoucher:fotoUrl,
    registradoPor:SES.u?SES.u.nombre:'',
    registradoEn:nowF()
  };
  if(!j.cargas)j.cargas=[];
  j.cargas.push(carga);
  saveJornada(j);
  renderResumenCarga(j,carga,false);
}

      '<td>'+(c.fotoVoucher?'<button class="exp-btn" style="padding:3px 8px;font-size:11px" onclick="togComb(this,'+ri+')">Ver</button>':'')+'</td>'+
      (isAdm?'<td><button class="exp-btn" style="padding:3px 8px;font-size:11px;border-color:#534AB7;color:#534AB7" onclick="renderEditCargaAdm('+j.id+','+c.id+')">Editar</button></td>':'')+
    '</tr>'+
    (c.fotoVoucher?
      '<tr id="comb-det-'+ri+'" style="display:none"><td colspan="'+colspan+'" style="padding:6px 10px;background:#FFFBF5">'+
      '<div class="inc-detail" style="background:#EAF3DE">'+
      '<span class="il" style="color:#27500A">📷 Comprobante de carga · '+c.fecha+' '+c.hora+'</span>'+
      '<div class="res-imgs" style="margin-top:6px"><img class="res-img" style="width:90px;height:70px" src="'+c.fotoVoucher+'" onclick="openImgViewer(\''+c.fotoVoucher+'\')"></div>'+
      '</div></td></tr>':'');
  }).join('');
}
function togComb(btn,ri){
  var r=document.getElementById('comb-det-'+ri);if(!r)return;
  var s=r.style.display==='none';r.style.display=s?'table-row':'none';
  btn.textContent=s?'Cerrar':'Ver';
}
function expCSVComb(){
  var rows=[];
  DB.jornadas.forEach(function(j){
    (j.cargas||[]).forEach(function(c){
      var mapsLink=c.lat&&c.lng?'https://www.google.com/maps?q='+c.lat+','+c.lng:'';
      rows.push([c.fecha,c.hora,j.hojaRuta,j.pat,j.cond,j.ayu,
        c.kmOdo||'',c.litros,c.valorTotal,c.valorLitro,
        c.lat||'',c.lng||'',mapsLink,
        c.fotoVoucher||'',
        '"'+c.registradoPor+'"','"'+c.registradoEn+'"'
      ].join(';'));
    });
  });
  if(!rows.length){alert('Sin cargas registradas.');return;}
  var hdr='Fecha;Hora;HR;Patente;Conductor;Ayudante;Km Odómetro;Litros;Valor Total;$/Litro;Latitud;Longitud;Mapa;Foto Voucher;Registrado por;Registrado en';
  var csvUrl=URL.createObjectURL(new Blob(['﻿'+hdr+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'}));
  var a=document.createElement('a');a.href=csvUrl;a.download='coherana_combustible.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(csvUrl);},200);
}
function renderAgregarCargaAdmin(){
  var cerradas=DB.jornadas.filter(function(j){return j.estado==='cerrado';});
  if(!cerradas.length){alert('No hay jornadas cerradas registradas.');return;}
  var opts=cerradas.map(function(j){return '<option value="'+j.id+'">HR: '+j.hojaRuta+' · '+j.fecha+' · '+j.pat+'</option>';}).join('');
  var ov=document.createElement('div');
  ov.id='admin-carga-overlay';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center';
  ov.innerHTML=
    '<div style="background:#fff;border-radius:16px 16px 0 0;padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto">'+
    '<div style="font-size:16px;font-weight:500;margin-bottom:1rem">Agregar carga a jornada cerrada</div>'+
    '<div class="lbl t0">Jornada</div>'+
    '<div class="field"><select id="adm-j-sel">'+opts+'</select></div>'+
    '<div class="lbl">Datos de la carga</div>'+
    '<div class="field"><label>Fecha <span class="req">*</span></label><input id="adm-c-fecha" type="date" value="'+toISO()+'"></div>'+
    '<div class="field"><label>Hora <span class="req">*</span></label><input id="adm-c-hora" type="time" value="'+nowT()+'"></div>'+
    '<div class="field"><label>Km — Odómetro <span class="req">*</span></label><input id="adm-c-km" type="number" inputmode="numeric" placeholder="Ej: 45230"></div>'+
    '<div class="field"><label>Litros cargados <span class="req">*</span></label><input id="adm-c-litros" type="number" step="0.01" min="0.01" inputmode="decimal" placeholder="Ej: 45.50" oninput="calcPxL(true)"></div>'+
    '<div class="field"><label>Valor total ($) <span class="req">*</span></label><input id="adm-c-valor" type="number" min="1" inputmode="numeric" placeholder="Ej: 50000" oninput="calcPxL(true)"></div>'+
    '<div id="adm-pxl-row" style="display:none;padding:10px 12px;background:#EEEDFE;border-radius:8px;margin-bottom:12px;font-size:13px">'+
      '<span style="color:#888">Precio por litro:</span> <strong id="adm-pxl" style="color:#3C3489"></strong>'+
    '</div>'+
    '<div class="field"><label>Foto del comprobante <span style="font-size:10px;color:#888;font-weight:400">(opcional)</span></label>'+
      '<div class="pzone" onclick="document.getElementById(\'adm-c-foto\').click()" id="adm-foto-zone"><p>📷 Adjuntar foto del comprobante</p></div>'+
      '<input id="adm-c-foto" type="file" accept="image/*" capture="environment" style="display:none" onchange="prevFotoGen(this,\'adm-foto-prev\',\'adm-foto-zone\',\'\')">'+
      '<div id="adm-foto-prev" class="pprev" style="margin-top:8px"></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
      '<button class="btn btn-o" style="margin-top:0" onclick="document.getElementById(\'admin-carga-overlay\').remove()">Cancelar</button>'+
      '<button class="btn btn-p" style="margin-top:0" onclick="guardarCargaAdmin()">Guardar</button>'+
    '</div>'+
    '<div style="height:1rem"></div></div>';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
}
async function guardarCargaAdmin(){
  var jornadaId=(document.getElementById('adm-j-sel')||{}).value;
  var kmAdm=parseInt((document.getElementById('adm-c-km')||{}).value)||0;
  var litros=parseFloat((document.getElementById('adm-c-litros')||{}).value)||0;
  var valor=parseFloat((document.getElementById('adm-c-valor')||{}).value)||0;
  if(!kmAdm||kmAdm<=0){alert('Ingresa el km del odómetro.');return;}
  if(!litros||litros<=0){alert('Ingresa los litros cargados.');return;}
  if(!valor||valor<=0){alert('Ingresa el valor total de la compra.');return;}
  var j=DB.jornadas.find(function(x){return String(x.id)===String(jornadaId);});
  if(!j){alert('Jornada no encontrada.');return;}
  var saveBtn=document.querySelector('#admin-carga-overlay .btn-p');
  if(saveBtn){saveBtn.textContent='Guardando...';saveBtn.disabled=true;}
  var fechaEl=document.getElementById('adm-c-fecha'),horaEl=document.getElementById('adm-c-hora');
  var fotoInp=document.getElementById('adm-c-foto');
  var fotoUrl='';
  if(fotoInp&&fotoInp.files&&fotoInp.files[0]){
    if(saveBtn)saveBtn.textContent='Subiendo foto...';
    try{var urls=await uploadImages(Array.from(fotoInp.files),jornadaId,'carga_v_adm');fotoUrl=urls[0]||'';}
    catch(e){console.error('Upload voucher admin:',e);}
  }
  var carga={
    id:Date.now(),
    fecha:fechaEl?fmt(fechaEl.value):fmt(toISO()),fechaISO:fechaEl?fechaEl.value:toISO(),
    hora:horaEl?horaEl.value:nowT(),
    lat:'',lng:'',
    kmOdo:kmAdm,
    litros:litros,valorTotal:valor,
    valorLitro:Math.round(valor/litros),
    fotoVoucher:fotoUrl,
    registradoPor:(SES.u?SES.u.nombre:'')+' (admin)',
    registradoEn:nowF()
  };
  if(!j.cargas)j.cargas=[];
  j.cargas.push(carga);
  saveJornada(j);
  renderResumenCarga(j,carga,true);
}

/* ── ADMIN EDIT CARGA ── */
function renderEditCargaAdm(jId,cargaId){
  var j=DB.jornadas.find(function(x){return x.id===jId;});if(!j)return;
  var c=(j.cargas||[]).find(function(x){return x.id===cargaId;});if(!c)return;
  var mapsLink=c.lat&&c.lng?'https://www.google.com/maps?q='+c.lat+','+c.lng:'';
  var ov=document.createElement('div');
  ov.id='ace-overlay';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;overflow-y:auto';
  ov.innerHTML=
    '<div style="background:#f5f5f7;min-height:100%;max-width:540px;margin:0 auto;padding:1rem 1rem 2rem">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">'+
      '<button onclick="document.getElementById(\'ace-overlay\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px">✕</button>'+
      '<div><div class="ph-t" style="margin-bottom:0">Editar carga de combustible</div>'+
      '<div style="font-size:12px;color:#888">'+j.pat+' · HR: '+j.hojaRuta+'</div></div>'+
    '</div>'+
    '<div class="lbl t0">Datos de la carga</div>'+
    '<div class="card">'+
      '<div class="field"><label>Fecha</label><input id="ace-fecha" type="date" value="'+(c.fechaISO||'')+'"></div>'+
      '<div class="field"><label>Hora</label><input id="ace-hora" type="time" value="'+(c.hora||'')+'"></div>'+
      '<div class="field"><label>Km (Odómetro)</label><input id="ace-km" type="number" inputmode="numeric" placeholder="Ej: 45230" value="'+(c.kmOdo||'')+'"></div>'+
      '<div class="field"><label>Litros cargados</label><input id="ace-litros" type="number" step="0.01" min="0.01" inputmode="decimal" value="'+c.litros+'" oninput="calcPxLAce()"></div>'+
      '<div class="field"><label>Valor total ($)</label><input id="ace-valor" type="number" min="1" inputmode="numeric" value="'+c.valorTotal+'" oninput="calcPxLAce()"></div>'+
      '<div id="ace-pxl-row" style="padding:10px 12px;background:#EEEDFE;border-radius:8px;margin-top:6px;font-size:13px">'+
        '<span style="color:#888">Precio por litro:</span> <strong id="ace-pxl" style="color:#3C3489">$'+Math.round(c.valorTotal/c.litros).toLocaleString('es-CL')+'/L</strong>'+
      '</div>'+
    '</div>'+
    (c.lat&&c.lng?
      '<div class="lbl">Ubicación GPS</div>'+
      '<div class="card"><div style="font-size:12px;font-family:monospace;color:#534AB7">'+c.lat+', '+c.lng+'</div>'+
      (mapsLink?'<a href="'+mapsLink+'" target="_blank" style="font-size:12px;color:#1D9E75;font-weight:500">Ver en mapa ↗</a>':'')+'</div>':'')+
    '<div class="lbl">Foto del comprobante</div>'+
    '<div class="card">'+
      (c.fotoVoucher?'<div style="margin-bottom:8px"><img class="pthumb" style="width:120px;height:90px" src="'+c.fotoVoucher+'" onclick="openImgViewer(\''+c.fotoVoucher+'\')"></div>':'')+
      '<div id="ace-foto-zone" class="pzone" onclick="document.getElementById(\'ace-foto-inp\').click()"><p>📷 '+(c.fotoVoucher?'Reemplazar':'Agregar')+' foto del comprobante</p></div>'+
      '<input id="ace-foto-inp" type="file" accept="image/*" capture="environment" style="display:none" onchange="prevFotoGen(this,\'ace-foto-prev\',\'ace-foto-zone\',\'\')">'+
      '<div id="ace-foto-prev" class="pprev" style="margin-top:8px"></div>'+
    '</div>'+
    '<div class="g2" style="margin-top:14px">'+
      '<button class="btn btn-o" style="margin-top:0" onclick="document.getElementById(\'ace-overlay\').remove()">Cancelar</button>'+
      '<button class="btn btn-p" style="margin-top:0" id="ace-save-btn" onclick="guardarEditCargaAdm('+jId+','+cargaId+')">Guardar</button>'+
    '</div>'+
    '<button class="btn btn-d" style="margin-top:8px" id="ace-del-btn" onclick="deleteCargaAdm('+jId+','+cargaId+')">Eliminar esta carga</button>'+
    '</div>';
  document.body.appendChild(ov);
}
function calcPxLAce(){
  var l=parseFloat((document.getElementById('ace-litros')||{}).value)||0;
  var v=parseFloat((document.getElementById('ace-valor')||{}).value)||0;
  var row=document.getElementById('ace-pxl-row'),el=document.getElementById('ace-pxl');
  if(l>0&&v>0&&row&&el){row.style.display='block';el.textContent='$'+(v/l).toLocaleString('es-CL',{maximumFractionDigits:0})+'/L';}
  else if(row)row.style.display='none';
}
async function guardarEditCargaAdm(jId,cargaId){
  var j=DB.jornadas.find(function(x){return x.id===jId;});if(!j)return;
  var c=(j.cargas||[]).find(function(x){return x.id===cargaId;});if(!c)return;
  var btn=document.getElementById('ace-save-btn');if(btn){btn.textContent='Guardando...';btn.disabled=true;}
  setSyncStatus(false,'Guardando...');
  var fotoInp=document.getElementById('ace-foto-inp');
  if(fotoInp&&fotoInp.files&&fotoInp.files[0]){
    try{var urls=await uploadImages(Array.from(fotoInp.files),j.id,'carga_edit_'+cargaId);if(urls[0])c.fotoVoucher=urls[0];}
    catch(e){}
  }
  var fi=(document.getElementById('ace-fecha')||{}).value;if(fi){c.fechaISO=fi;c.fecha=fmt(fi);}
  var ho=(document.getElementById('ace-hora')||{}).value;if(ho)c.hora=ho;
  var km=parseInt((document.getElementById('ace-km')||{}).value);if(km>0)c.kmOdo=km;
  var litros=parseFloat((document.getElementById('ace-litros')||{}).value);if(litros>0)c.litros=litros;
  var valor=parseFloat((document.getElementById('ace-valor')||{}).value);if(valor>0)c.valorTotal=valor;
  if(c.litros&&c.valorTotal)c.valorLitro=Math.round(c.valorTotal/c.litros);
  saveJornada(j);
  var ov=document.getElementById('ace-overlay');if(ov)ov.remove();
  renderTblComb();
}
function deleteCargaAdm(jId,cargaId){
  var btn=document.getElementById('ace-del-btn');if(!btn)return;
  if(btn.dataset.step==='confirm'){
    var j=DB.jornadas.find(function(x){return x.id===jId;});if(!j)return;
    j.cargas=(j.cargas||[]).filter(function(c){return c.id!==cargaId;});
    saveJornada(j);
    var ov=document.getElementById('ace-overlay');if(ov)ov.remove();
    renderTblComb();
  }else{
    btn.dataset.step='confirm';
    btn.textContent='¿Confirmar? Toca de nuevo para eliminar';
    setTimeout(function(){if(btn&&btn.dataset.step==='confirm'){delete btn.dataset.step;btn.textContent='Eliminar esta carga';}},4000);
  }
}
