<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{max-width:540px;margin:0 auto;min-height:100vh;background:#f5f5f3}
.pad{padding:1rem}
.lbl{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 6px}
.lbl.t0{margin-top:0}
.req{color:#A32D2D}
.card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem;margin-bottom:10px}
.field{margin-bottom:10px}.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:#888;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:15px;padding:9px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111}
.field textarea{min-height:60px;resize:vertical}
.field input.err,.field input.er2{border-color:#A32D2D;background:#fff8f8}
.ferr{font-size:12px;color:#A32D2D;margin-top:3px}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;display:block;margin-top:6px}
.btn-p{background:#534AB7;color:#fff}.btn-d{background:#A32D2D;color:#fff}
.btn-o{background:#fff;color:#111;border:0.5px solid rgba(0,0,0,.2)}
.btn-g{background:#1D9E75;color:#fff}.btn-wa{background:#25D366;color:#fff}
.sel-btn{width:100%;padding:9px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left}
.sel-btn .ph{color:#888}
.dp{background:#fff;border:0.5px solid rgba(0,0,0,.2);border-radius:12px;margin-top:4px;overflow:hidden;display:none;position:relative;z-index:30}
.dp.open{display:block}
.dp input{width:100%;padding:9px 10px;border:none;border-bottom:0.5px solid rgba(0,0,0,.1);font-size:14px;background:#f5f5f3;color:#111}
.dp-list{max-height:170px;overflow-y:auto}
.dpi{padding:9px 12px;font-size:14px;cursor:pointer;color:#111;border-bottom:0.5px solid rgba(0,0,0,.07)}
.dpi:last-child{border-bottom:none}.dpi:hover{background:#f5f5f3}
.dpi .sub{font-size:11px;color:#888;margin-top:1px}
.dp-mt{padding:1rem;text-align:center;color:#888;font-size:13px}
.fuel-g{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.fb{padding:9px 4px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-size:12px;font-weight:500;color:#111}
.fb.sel{background:#EEEDFE;border-color:#534AB7;color:#3C3489}
.vsg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
.vsb{padding:13px 6px;border:0.5px solid rgba(0,0,0,.2);border-radius:10px;background:#fff;cursor:pointer;text-align:center}
.vsb.sel{border-color:#534AB7;background:#EEEDFE}.vsb.done{opacity:.4;pointer-events:none}
.vsb .vn{font-size:19px;font-weight:500}.vsb.sel .vn{color:#3C3489}
.vsb .vh{font-size:11px;color:#888;margin-top:2px}
.stags{display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin-bottom:8px}
.stag{padding:4px 9px;background:#EEEDFE;border-radius:20px;font-size:12px;color:#3C3489;display:inline-flex;align-items:center;gap:3px}
.stag button{background:none;border:none;color:#534AB7;font-size:14px;cursor:pointer;padding:0;line-height:1}
.rrow{display:flex;gap:8px;margin-top:4px}
.ropt{flex:1;padding:9px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;text-align:center;color:#888}
.ropt.yes{background:#EAF3DE;border-color:#3B6D11;color:#27500A}.ropt.no{background:#f5f5f3;color:#111}
.pzone{border:0.5px dashed rgba(0,0,0,.2);border-radius:8px;padding:11px;text-align:center;cursor:pointer;margin-top:8px;background:#f5f5f3}
.pzone p{font-size:13px;color:#888}
.pprev{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.pthumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:0.5px solid rgba(0,0,0,.1);cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bv1{background:#E1F5EE;color:#085041}.bv2{background:#E6F1FB;color:#0C447C}.bv3{background:#FAEEDA;color:#633806}
.bdmg{background:#FCEBEB;color:#791F1F}.bok{background:#EAF3DE;color:#27500A}.bact{background:#EEEDFE;color:#3C3489}.bwrn{background:#FAEEDA;color:#633806}
.fase-pip{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;background:#f0f0ee;color:#aaa;margin-right:3px;border:0.5px solid #ddd}
.fase-pip.done{background:#EEEDFE;color:#534AB7;border-color:#AFA9EC}
.phase-hdr{background:linear-gradient(135deg,#f0efff,#eaf0ff);border-radius:12px;padding:12px 14px;margin-bottom:14px;border:0.5px solid #AFA9EC}
.phase-num{font-size:10px;font-weight:600;color:#534AB7;text-transform:uppercase;letter-spacing:.08em}
.phase-title{font-size:17px;font-weight:600;color:#3C3489;margin-top:3px}
.sbar{display:flex;gap:6px;margin-bottom:1rem}
.step{flex:1;height:3px;border-radius:2px;background:rgba(0,0,0,.1)}.step.d{background:#534AB7}.step.c{background:#AFA9EC}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 1rem;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1);position:sticky;top:0;z-index:20}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-logo{width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0}
.hdr-n{font-size:13px;font-weight:500}.hdr-r{font-size:11px;color:#888}
.log-btn{font-size:12px;padding:5px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;background:none;cursor:pointer;color:#888}
.tab-bar{display:flex;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1)}
.tb{flex:1;padding:10px 4px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap}
.tb.active{color:#534AB7;border-bottom:2px solid #534AB7}
.view{display:none}.view.active{display:block}
.pin-dots{display:flex;justify-content:center;gap:10px;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #534AB7;background:transparent}
.pin-dot.f{background:#534AB7}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto 8px}
.pk{padding:15px;border:0.5px solid rgba(0,0,0,.2);border-radius:10px;background:#fff;font-size:20px;font-weight:500;cursor:pointer;text-align:center}
.pk:active{background:#f0f0f0}.pk.delk{font-size:15px;color:#A32D2D}
.pin-err{color:#A32D2D;font-size:13px;text-align:center;min-height:18px;margin:4px 0}
.day-hdr{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem;margin-bottom:10px}
.day-pat{font-size:20px;font-weight:500}.day-meta{font-size:13px;color:#888;margin-top:2px}
.day-km{font-size:12px;color:#888;margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(0,0,0,.08)}
.vc{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:12px;margin-bottom:8px}
.vc-t{font-size:14px;font-weight:500}.vc-m{font-size:11px;color:#888;margin-top:2px}
.vc-bg{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;align-items:center}
.act-btn{padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap}
.btn-edit{border:0.5px solid #534AB7;background:none;color:#534AB7}
.btn-del-v{border:0.5px solid #A32D2D;background:none;color:#A32D2D}
.btn-cont{border:none;background:#534AB7;color:#fff}
.del-confirm{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.del-confirm span{font-size:12px;color:#A32D2D}
.del-yes{padding:4px 10px;background:#A32D2D;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.del-no{padding:4px 10px;background:none;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;font-size:12px;cursor:pointer}
.empty-d{text-align:center;padding:1.25rem;color:#888;font-size:13px;background:#f5f5f3;border-radius:8px;margin-bottom:10px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.sc{background:#f5f5f3;border-radius:8px;padding:12px;text-align:center}
.sc .sv{font-size:22px;font-weight:500}.sc .sl{font-size:11px;color:#888;margin-top:2px}
.fr{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fr select{font-size:13px;padding:6px 8px;border:0.5px solid rgba(0,0,0,.18);border-radius:8px;background:#fff;color:#111;flex:1;min-width:100px}
.tc{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden;margin-bottom:10px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:720px}
th{background:#f5f5f3;padding:7px 9px;text-align:left;font-weight:500;font-size:11px;color:#888;border-bottom:0.5px solid rgba(0,0,0,.08);white-space:nowrap}
td{padding:7px 9px;border-bottom:0.5px solid rgba(0,0,0,.06);color:#111;white-space:nowrap;font-size:12px}
tr:last-child td{border-bottom:none}
.exp-btn{padding:6px 12px;border:0.5px solid rgba(0,0,0,.18);border-radius:8px;background:#fff;color:#111;font-size:12px;cursor:pointer}
.empty-msg{padding:2rem;text-align:center;color:#888;font-size:13px}
.inc-detail{font-size:12px;padding:8px 10px;background:#FFF8EE;border-radius:8px;margin:3px 0;word-break:break-word;white-space:normal}
.inc-detail .il{font-weight:500;color:#888;font-size:11px;display:block;margin-bottom:2px}
.adm-r{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.adm-r input,.adm-r select{flex:1;font-size:14px;padding:8px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111}
.add-btn{padding:8px 14px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.il-list{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden;margin-bottom:10px}
.ir{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 12px;border-bottom:0.5px solid rgba(0,0,0,.06);font-size:13px}
.ir:last-child{border-bottom:none}.ir-sub{font-size:11px;color:#888;margin-top:2px}
.del-btn{color:#A32D2D;font-size:12px;padding:3px 8px;border:0.5px solid #F09595;border-radius:6px;background:none;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ub{border:0.5px dashed rgba(0,0,0,.18);border-radius:10px;padding:11px;text-align:center;background:#f5f5f3;cursor:pointer;margin-bottom:6px}
.ub p{font-size:12px;color:#888;margin-bottom:5px}
.tpl-btn{font-size:12px;padding:4px 10px;border:0.5px solid rgba(0,0,0,.18);border-radius:6px;background:#fff;color:#111;cursor:pointer;display:inline-block}
.ur{font-size:12px;padding:7px 10px;border-radius:8px;margin-top:4px;margin-bottom:6px;display:none}
.ur.ok{background:#EAF3DE;color:#27500A;display:block}.ur.err{background:#FCEBEB;color:#791F1F;display:block}
.perm-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.perm-cb{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
.perm-cb input{width:16px;height:16px;accent-color:#534AB7}
.adm-sec{margin-bottom:1.5rem}
.rr{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,.07)}
.rr:last-child{border-bottom:none}
.fixed-val{padding:9px 10px;border:0.5px solid rgba(0,0,0,.1);border-radius:8px;font-size:14px;background:#f5f5f3}
.pwa-banner{background:#EEEDFE;border:0.5px solid #534AB7;border-radius:12px;padding:12px 1rem;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.pwa-banner p{font-size:13px;color:#3C3489;flex:1}
.pwa-add{padding:7px 14px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.pwa-close{background:none;border:none;color:#534AB7;font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0}
.res-card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:12px;border:0.5px solid rgba(0,0,0,.08)}
.res-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(83,74,183,.15)}
.res-logo{width:40px;height:40px;border-radius:10px;overflow:hidden;flex-shrink:0}
.res-logo img{width:100%;height:100%;object-fit:cover}
.res-title{font-size:15px;font-weight:500;color:#111}
.res-sub{font-size:12px;color:#888;margin-top:2px}
.res-section{margin-bottom:12px}
.res-section-title{font-size:10px;font-weight:500;color:#534AB7;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.res-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid rgba(0,0,0,.05)}
.res-row:last-child{border-bottom:none}
.res-lbl{color:#888}.res-val{color:#111;font-weight:500;text-align:right;max-width:60%}
.res-inc-block{background:#FFF3F3;border-radius:6px;padding:8px 10px;margin-top:6px}
.res-inc-lbl{font-size:10px;font-weight:500;color:#A32D2D;margin-bottom:2px}
.res-inc-val{font-size:12px;color:#333}
.res-vuelta{background:#f8f7ff;border-radius:8px;padding:10px;margin-bottom:6px}
.res-v-title{font-size:12px;font-weight:500;color:#534AB7;margin-bottom:6px}
.res-imgs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.res-img{width:60px;height:60px;border-radius:6px;object-fit:cover;cursor:pointer}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.loading-overlay p{font-size:14px;color:#534AB7;font-weight:500;text-align:center;padding:0 2rem}
.spin{width:32px;height:32px;border:3px solid #EEEDFE;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}
.prog-bar{width:200px;height:4px;background:#EEEDFE;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#534AB7;border-radius:2px;transition:width .3s}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
.sync-err{background:#A32D2D}
.img-viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:998;display:flex;align-items:center;justify-content:center}
.img-viewer img{max-width:95%;max-height:90vh;border-radius:8px}
.img-viewer-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:600px){.wrap{border-left:0.5px solid rgba(0,0,0,.08);border-right:0.5px solid rgba(0,0,0,.08)}}
@media(min-width:1024px){body{background:#eeeee8;padding:2rem 0}.wrap{border-radius:16px;overflow:hidden;box-shadow:0 0 0 0.5px rgba(0,0,0,.1);min-height:auto}}
</style>

function setLoading(msg,pct){var ov=document.getElementById('loading-overlay'),lm=document.getElementById('loading-msg'),pf=document.getElementById('prog-fill');if(ov)ov.style.display='flex';if(lm)lm.textContent=msg||'Cargando...';if(pf)pf.style.width=(pct||0)+'%';}

function saveConfig(){fbdb.collection('config').doc('app').set({usuarios:DB.usuarios,patentes:DB.patentes,sucursales:DB.sucursales,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){setSyncStatus(true,'Sincronizado');}).catch(function(e){setSyncStatus(false,'Error sync');});}
function saveJornada(j){var jc=JSON.parse(JSON.stringify(j));fbdb.collection('jornadas').doc(String(j.id)).set(jc).then(function(){setSyncStatus(true,'Sincronizado');}).catch(function(e){setSyncStatus(false,'Error sync');});}
async function loadFromFirestore(){
  setLoading('Conectando...',20);
  try{
    var cd=await fbdb.collection('config').doc('app').get();setLoading('Cargando datos...',55);
    if(cd.exists){var d=cd.data();if(d.usuarios)DB.usuarios=d.usuarios;if(d.patentes)DB.patentes=d.patentes;if(d.sucursales)DB.sucursales=d.sucursales;}
    var snap=await fbdb.collection('jornadas').orderBy('id','desc').limit(200).get();
    DB.jornadas=snap.docs.map(function(doc){return doc.data();});
    setLoading('Listo',100);setTimeout(hideLoading,400);setSyncStatus(true,'Sincronizado');
  }catch(e){
    setLoading('Sin conexi&#243;n. Modo local.',100);
    try{var d=localStorage.getItem('sc14');if(d){var p=JSON.parse(d);['usuarios','patentes','sucursales','jornadas'].forEach(function(k){if(p[k])DB[k]=p[k];});}}catch(e2){}
    setTimeout(hideLoading,1500);setSyncStatus(false,'Sin conexi&#243;n');
  }
  document.getElementById('s-login').style.display='block';
}

/* ── Image utils ── */
function compressImage(file,maxW,quality){return new Promise(function(resolve){var canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),img=new Image();img.onload=function(){var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);canvas.toBlob(function(blob){resolve(blob);},'image/jpeg',quality||0.72);};img.src=URL.createObjectURL(file);});}
async function uploadImages(files,jornadaId,tag){
  var urls=[];
  for(var i=0;i<files.length;i++){try{var c=await compressImage(files[i],1024,0.72);var path='jornadas/'+jornadaId+'/'+tag+'_'+Date.now()+'_'+i+'.jpg';var ref=fbst.ref(path);await ref.put(c,{contentType:'image/jpeg'});urls.push(await ref.getDownloadURL());}catch(e){console.error('Upload err',e);}}
  return urls;
}

/* ── Helpers ── */
function toISO(){var d=new Date(),m=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(dd<10?'0':'')+dd;}
function fmt(iso){if(!iso)return '';var p=iso.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function nowT(){return new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});}
function nowF(){return new Date().toLocaleString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function toMins(t){if(!t)return -1;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function actJ(){return DB.jornadas.find(function(j){return j.estado==='activo';})||null;}
function allU(){return [MASTER].concat(DB.usuarios);}
function getConds(){return DB.usuarios.filter(function(u){return u.rol==='conductor';});}
function getAyus(){return DB.usuarios.filter(function(u){return u.rol==='ayudante';});}
function parseSucs(s){if(!s)return [];return s.split(', ').map(function(x){var n=parseInt(x.replace('Suc.',''));return DB.sucursales.find(function(y){return y.n===n;})||{n:n,addr:x};}).filter(Boolean);}
function prevVuelta(j,num){var p=null;j.vueltas.forEach(function(v){if(v.num<num&&(!p||v.num>p.num))p=v;});return p;}
function lastVuelta(j){var p=null;j.vueltas.forEach(function(v){if(!p||v.num>p.num)p=v;});return p;}
function actVuelta(j,num){return j.vueltas.find(function(v){return v.num===num;})||null;}
function resLogoHTML(){return '<div class="res-logo"><img src="'+LOGO_SM+'" style="width:40px;height:40px;object-fit:cover;border-radius:10px"></div>';}

function askDel(row,fn){var ex=row.querySelector('.del-confirm');if(ex){ex.remove();return;}var db=row.querySelector('.del-btn,.btn-del-v');if(db)db.style.display='none';var div=document.createElement('div');div.className='del-confirm';div.innerHTML='<span>&#191;Eliminar?</span><button class="del-yes">S&#237;</button><button class="del-no">Cancelar</button>';div.querySelector('.del-yes').onclick=function(){fn();};div.querySelector('.del-no').onclick=function(){div.remove();if(db)db.style.display='';};row.appendChild(div);}
function openDrop(id){if(ODK&&ODK!==id){var p=document.getElementById('dp-'+ODK);if(p)p.classList.remove('open');}var el=document.getElementById('dp-'+id);if(!el)return;var was=el.classList.contains('open');el.classList.toggle('open',!was);ODK=was?null:id;if(!was){var s=el.querySelector('input');if(s){s.value='';fillDrop(id,'');}}}

function fillUsrDP(q){var el=document.getElementById('dpl-usr');if(!el)return;var items=allU().filter(function(u){return u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});el.innerHTML=items.length?items.map(function(u){return '<div class="dpi" onclick="selUsr(\''+u.id+'\')">'+u.nombre+'<div class="sub">'+u.rol+'</div></div>';}).join(''):'<div class="dp-mt">Sin resultados</div>';}
function fillDrop(id,q){
  var el=document.getElementById('dpl-'+id);if(!el)return;
  var items=[];
  if(id==='pat'||id==='j-pat')items=DB.patentes.filter(function(p){return p.toLowerCase().indexOf(q.toLowerCase())>=0;});
  if(id==='cond'||id==='j-cond')items=getConds().filter(function(u){return u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});
  if(id==='ayu'||id==='j-ayu')items=getAyus().filter(function(u){return u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});
  if(id==='ayu2'){var j=actJ();var ex=j?j.ayu:'';items=getAyus().filter(function(u){return u.nombre!==ex&&u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});}
  if(id==='suc')items=DB.sucursales.filter(function(s){return String(s.n).indexOf(q)>=0||s.addr.toLowerCase().indexOf(q.toLowerCase())>=0;});
  if(!items.length){el.innerHTML='<div class="dp-mt">Sin resultados</div>';return;}
  if(id==='suc'){el.innerHTML=items.map(function(s){return '<div class="dpi" onclick="addSucTag('+s.n+')"><div>Sucursal '+s.n+'</div><div class="sub">'+s.addr+'</div></div>';}).join('');}
  else{el.innerHTML=items.map(function(v){var nm=v.nombre||v;var safe=nm.replace(/'/g,'&#39;');return '<div class="dpi" onclick="selDP(\''+id+'\',\''+safe+'\')">'+nm+'</div>';}).join('');}
}
function selUsr(id){loginUsr=allU().find(function(u){return u.id===id;});if(!loginUsr)return;var lbl=document.getElementById('lbl-usr');lbl.textContent=loginUsr.nombre;lbl.classList.remove('ph');document.getElementById('dp-usr').classList.remove('open');ODK=null;pinBuf='';updDots();document.getElementById('pin-err').textContent='';document.getElementById('pin-sec').style.display='block';}

function addSucTag(n){var s=DB.sucursales.find(function(x){return x.n===n;});if(!s||vSt.sucs.find(function(x){return x.n===n;}))return;vSt.sucs.push(s);var dp=document.getElementById('dp-suc');if(dp)dp.classList.remove('open');ODK=null;renderSucTags();}
function removeSucTag(n){vSt.sucs=vSt.sucs.filter(function(s){return s.n!==n;});renderSucTags();}

function pk(k){if(pinBuf.length>=4)return;pinBuf+=k;updDots();if(pinBuf.length===4)setTimeout(doLogin,120);}

function doLogin(){document.getElementById('pin-err').textContent='';if(!loginUsr||pinBuf!==loginUsr.pin){document.getElementById('pin-err').textContent='PIN incorrecto';pinBuf='';updDots();return;}if(loginUsr.mustChangePIN){SES.u=loginUsr;showCP();}else{startSess(loginUsr);}}

function doCP(){var p1=document.getElementById('cp1').value.trim(),p2=document.getElementById('cp2').value.trim();if(!/^\d{4}$/.test(p1)){document.getElementById('cp-err').textContent='El PIN debe ser exactamente 4 d&#237;gitos.';return;}if(p1!==p2){document.getElementById('cp-err').textContent='Los PINs no coinciden.';return;}var u=DB.usuarios.find(function(x){return x.id===SES.u.id;});if(u){u.pin=p1;u.mustChangePIN=false;saveConfig();}SES.u.pin=p1;SES.u.mustChangePIN=false;document.getElementById('s-chpin').style.display='none';startSess(SES.u);}
function startSess(u){SES.u=u;document.getElementById('s-login').style.display='none';document.getElementById('s-chpin').style.display='none';document.getElementById('s-app').style.display='block';document.getElementById('hdr-n').textContent=u.nombre;document.getElementById('hdr-r').textContent=u.rol;var perms=u.permisos||[];document.getElementById('tab-bar').innerHTML=(perms.indexOf('jornada')>=0?'<button class="tb active" onclick="goTab(\'jornada\')">Jornada</button>':'')+(perms.indexOf('registros')>=0?'<button class="tb" onclick="goTab(\'panel\')">Registros</button>':'')+(perms.indexOf('admin')>=0?'<button class="tb" onclick="goTab(\'admin\')">Administrar</button>':'');document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});var first=perms[0]||'jornada';var fv=document.getElementById('v-'+first);if(fv)fv.classList.add('active');if(first==='jornada')renderJ();else if(first==='panel')renderPanel();else if(first==='admin')renderAdmin();}
function logout(){SES={u:null};loginUsr=null;pinBuf='';document.getElementById('s-app').style.display='none';document.getElementById('s-login').style.display='block';var lbl=document.getElementById('lbl-usr');lbl.textContent='Buscar usuario...';lbl.classList.add('ph');document.getElementById('pin-sec').style.display='none';updDots();}

function iniciarJ(){
  var hr=document.getElementById('i-hr').value.trim();

  if(hre)hre.textContent='';
  if(!hr){if(hre)hre.textContent='Ingresa el N&#186; de Hoja de Ruta.';return;}
  if(!iniSt.pat){alert('Selecciona una patente.');return;}
  if(iniSt.fuelIdx<0){alert('Indica el combustible inicial.');return;}
  var km=parseInt(document.getElementById('i-km').value)||0;if(!km){alert('Ingresa el km inicial.');return;}
  var fi=document.getElementById('i-fecha').value;if(!fi){alert('Indica la fecha.');return;}
  var u=SES.u,cL=document.getElementById('lbl-cond'),aL=document.getElementById('lbl-ayu');
  var cond=u.rol==='conductor'?u.nombre:((cL&&!cL.classList.contains('ph'))?cL.textContent:'');
  var ayu=u.rol==='ayudante'?u.nombre:((aL&&!aL.classList.contains('ph'))?aL.textContent:'');
  if(!cond){alert('Selecciona el conductor.');return;}if(!ayu){alert('Selecciona el ayudante.');return;}
  var j={id:Date.now(),fecha:fmt(fi),fechaISO:fi,horaIni:nowT(),pat:iniSt.pat,hojaRuta:hr,cond:cond,ayu:ayu,kmIni:km,fuelIni:FUELS[iniSt.fuelIdx],vueltas:[],estado:'activo',kmFin:0,fuelFin:'',horaFin:'',kmTotal:0};
  DB.jornadas.unshift(j);saveJornada(j);renderActivo(j);
}

function continuarVuelta(num){var j=actJ();var v=actVuelta(j,num);if(!v||!v.fase1Done){renderFase1(j,num,false);return;}if(!v.fase2Done){renderFase2(j,v,false);return;}if(!v.fase3Done){renderFase3(j,v,false);}}
function editFase(fase,num){var j=actJ();var v=actVuelta(j,num);if(!v)return;if(fase===1)renderFase1(j,num,true);else if(fase===2)renderFase2(j,v,true);else if(fase===3)renderFase3(j,v,true);}

async function guardarFase1(){
  var j=actJ();var num=vSt.num;
  if(!vSt.sucs.length){alert('Selecciona al menos una sucursal.');return;}
  clrErr(['err-ks']);
  var ks=parseInt(document.getElementById('v-ks').value)||0;
  var hs=document.getElementById('v-hs').value;
  var pv=prevVuelta(j,num);
  if(pv&&pv.kmllg&&ks&&ks<pv.kmllg){setErr('err-ks','Km salida debe ser &ge; km llegada de la '+pv.num+'&#170; vuelta ('+pv.kmllg+').');return;}
  var btn=document.getElementById('btn-f1');if(btn){btn.textContent='Guardando...';btn.disabled=true;}
  setSyncStatus(false,'Subiendo...');
  var a2El=document.getElementById('lbl-ayu2');var a2N=(a2El&&!a2El.classList.contains('ph'))?a2El.textContent:(vSt.ayu2||'');
  var ev=actVuelta(j,num);
  var prevImgs1=(ev&&ev.imgs1)||[];
  var newImgs1=vSt.imgs1&&vSt.imgs1.length?await uploadImages(vSt.imgs1,j.id,'v'+num+'_f1_ds'):[];
  var vuelta={
    num:num,sucs:vSt.sucs.map(function(s){return 'Suc.'+s.n;}).join(', '),ayu2:a2N,
    hsal:hs,kmsal:ks,ds:vSt.ds,dscmt:document.getElementById('v-dc')?document.getElementById('v-dc').value:'',
    imgs1:prevImgs1.concat(newImgs1),fase1Done:true,
    de:ev?(ev.de||''):'',decmt:ev?(ev.decmt||''):'',imgs2:ev?(ev.imgs2||[]):[],rc:ev?(ev.rc||''):'',rccmt:ev?(ev.rccmt||''):'',fase2Done:ev?(ev.fase2Done||false):false,
    hllg:ev?(ev.hllg||''):'',kmllg:ev?(ev.kmllg||0):0,kmrec:ev?(ev.kmrec||0):0,obs:ev?(ev.obs||''):'',fase3Done:ev?(ev.fase3Done||false):false,
    updatedAt:nowF()
  };
  if(ev){var idx=j.vueltas.indexOf(ev);if(idx>=0)j.vueltas[idx]=vuelta;}else{j.vueltas.push(vuelta);}
  saveJornada(j);renderResumenFase1(j,vuelta);
}

async function confirmarGuardar(){

  }

}

function dlT(id){if(typeof XLSX==='undefined'){alert('Cargando...');return;}var ws,wb=XLSX.utils.book_new();if(id==='usr-xls')ws=XLSX.utils.aoa_to_sheet([['Nombre','Rol','PIN','Permisos'],['Juan','conductor','1234','jornada']]);else if(id==='pat-xls')ws=XLSX.utils.aoa_to_sheet([['Patente'],['ABCD12']]);else ws=XLSX.utils.aoa_to_sheet([['Numero','Direccion'],[1,'Av. Ejemplo 123']]);XLSX.utils.book_append_sheet(wb,ws,'Datos');XLSX.writeFile(wb,id.replace('-xls','')+'.xlsx');}
function hXLS(id,inp){var file=inp.files[0];if(!file)return;var res=document.getElementById('ur-'+id);loadX(function(){var reader=new FileReader();reader.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'array'});var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});var count=0;if(id==='usr-xls'){rows.forEach(function(r){var n=String(r['Nombre']||'').trim(),rol=String(r['Rol']||'conductor').trim(),p=String(r['PIN']||'').trim(),pm=String(r['Permisos']||'jornada').split(',').map(function(x){return x.trim();});if(n&&p&&!DB.usuarios.find(function(x){return x.nombre===n;})){DB.usuarios.push({id:'u'+Date.now()+'x'+count,nombre:n,rol:rol,pin:p,mustChangePIN:true,permisos:pm});count++;}});}else if(id==='pat-xls'){rows.forEach(function(r){var v=String(r['Patente']||'').trim().toUpperCase();if(v&&DB.patentes.indexOf(v)<0){DB.patentes.push(v);count++;}});}else{rows.forEach(function(r){var n=parseInt(r['Numero']||0),a=String(r['Direccion']||'').trim();if(n&&a&&!DB.sucursales.find(function(s){return s.n===n;})){DB.sucursales.push({n:n,addr:a});count++;}});DB.sucursales.sort(function(a,b){return a.n-b.n;});}saveConfig();res.className='ur ok';res.textContent=count+' registros importados.';inp.value='';setTimeout(renderAdmin,300);}catch(err){res.className='ur err';res.textContent='Error al leer el archivo.';}};reader.readAsArrayBuffer(file);});}

function addU(){var n=document.getElementById('nu-n').value.trim(),r=document.getElementById('nu-r').value,p=document.getElementById('nu-p').value.trim();if(!n||!p){alert('Completa nombre y PIN.');return;}if(!/^\d{4}$/.test(p)){alert('El PIN debe ser 4 d&#237;gitos.');return;}if(allU().find(function(u){return u.nombre===n;})){alert('Ya existe ese usuario.');return;}var perms=[];if(document.getElementById('pm-j').checked)perms.push('jornada');if(document.getElementById('pm-r').checked)perms.push('registros');if(document.getElementById('pm-a').checked)perms.push('admin');if(!perms.length){alert('Selecciona al menos un m&#243;dulo.');return;}DB.usuarios.push({id:'u'+Date.now(),nombre:n,rol:r,pin:p,mustChangePIN:true,permisos:perms});saveConfig();renderAdmin();}
function addP(){var v=document.getElementById('np').value.trim().toUpperCase();if(!v)return;if(DB.patentes.indexOf(v)<0)DB.patentes.push(v);document.getElementById('np').value='';saveConfig();renderAdmin();}
function addS(){var n=parseInt(document.getElementById('ns-n').value),a=document.getElementById('ns-a').value.trim();if(!n||!a){alert('Ingresa n&#250;mero y direcci&#243;n.');return;}if(DB.sucursales.find(function(s){return s.n===n;})){alert('Ya existe.');return;}DB.sucursales.push({n:n,addr:a});DB.sucursales.sort(function(a,b){return a.n-b.n;});document.getElementById('ns-n').value='';document.getElementById('ns-a').value='';saveConfig();renderAdmin();}
function filtS(q){var el=document.getElementById('suc-list');if(!el)return;var q2=q.toLowerCase(),items=DB.sucursales.filter(function(s){return !q2||String(s.n).indexOf(q2)>=0||s.addr.toLowerCase().indexOf(q2)>=0;});el.innerHTML=items.map(function(s){return '<div class="ir" id="ir-s-'+s.n+'"><div><div>Suc. '+s.n+'</div><div class="ir-sub">'+s.addr+'</div></div><button class="del-btn" onclick="askDelS('+s.n+')">Eliminar</button></div>';}).join('')||'<div class="empty-msg">Sin resultados</div>';}

/* ── Start ── */
loadFromFirestore();
</script></body></html>
